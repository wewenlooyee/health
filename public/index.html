<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧健康日誌與風險評估系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS 變數定義 (預設為淺色與藍色主題) */
        :root {
            --primary-color: #4A90E2; /* 預設藍色 */
            --bg-color: #F4F7F6;
            --text-color: #333333;
            --card-bg: #FFFFFF;
            --input-bg: #FFFFFF;
            --border-color: #cccccc;
            
            --badge-low: #E8F5E9;
            --badge-low-text: #2E7D32;
            --badge-medium: #FFF8E1;
            --badge-medium-text: #F57F17;
            --badge-high: #FFEBEE;
            --badge-high-text: #C62828;
        }

        /* 深色模式變數 */
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #E0E0E0;
            --card-bg: #1E1E1E;
            --input-bg: #2C2C2C;
            --border-color: #444444;
            
            --badge-low: #1B5E20;
            --badge-low-text: #A5D6A7;
            --badge-medium: #F57F17;
            --badge-medium-text: #FFE082;
            --badge-high: #b71c1c;
            --badge-high-text: #ef9a9a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { max-width: 1000px; margin: auto; }

        /* 頂部設定區域：主題與顏色 */
        .settings-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .settings-bar select, .settings-bar button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary-color); margin-bottom: 5px; transition: color 0.3s; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            transition: background-color 0.3s;
        }

        .demo-section {
            background-color: transparent;
            border: 1px dashed var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-demo {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-demo-low { background-color: var(--badge-low); color: var(--badge-low-text); border: 1px solid var(--badge-low-text); }
        .btn-demo-high { background-color: var(--badge-high); color: var(--badge-high-text); border: 1px solid var(--badge-high-text); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: opacity 0.3s, background-color 0.3s;
        }
