<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧健康日誌與風險評估系統</title>

    <style>
        /* CSS 變數定義 (預設為淺色與藍色主題) */
        :root {
            --primary-color: #4A90E2; /* 預設藍色 */
            --bg-color: #F4F7F6;
            --text-color: #333333;
            --card-bg: #FFFFFF;
            --input-bg: #FFFFFF;
            --border-color: #cccccc;
            
            --badge-low: #E8F5E9;
            --badge-low-text: #2E7D32;
            --badge-medium: #FFF8E1;
            --badge-medium-text: #F57F17;
            --badge-high: #FFEBEE;
            --badge-high-text: #C62828;
        }

        /* 深色模式變數 */
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #E0E0E0;
            --card-bg: #1E1E1E;
            --input-bg: #2C2C2C;
            --border-color: #444444;
            
            --badge-low: #1B5E20;
            --badge-low-text: #A5D6A7;
            --badge-medium: #F57F17;
            --badge-medium-text: #FFE082;
            --badge-high: #b71c1c;
            --badge-high-text: #ef9a9a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { max-width: 1000px; margin: auto; }

        /* 頂部設定區域：主題與顏色 */
        .settings-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

            padding: 8px 12px;
            border-radius: 6px;
